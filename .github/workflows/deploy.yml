name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate guests.json
        run: python3 -c "import json, sys; json.load(open('guests.json')); print('guests.json is valid')"

      - name: Check avatar images
        run: python3 .github/check-avatars.py

      - name: Check OPML is up-to-date
        run: |
          node generate-opml.mjs /tmp/cuistops-guests-check.opml
          diff <(grep -v '<dateCreated>' cuistops-guests.opml) <(grep -v '<dateCreated>' /tmp/cuistops-guests-check.opml) \
            || { echo "cuistops-guests.opml is out of date. Run: node generate-opml.mjs cuistops-guests.opml"; exit 1; }

      - name: Generate OPML
        run: node generate-opml.mjs cuistops-guests.opml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
