<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CuistOps — les copains</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2e42;
      --accent: #6c63ff;
      --accent-soft: rgba(108, 99, 255, 0.15);
      --text: #e8eaf0;
      --text-muted: #8b90a7;
      --linkedin: #0a66c2;
      --bluesky: #0085ff;
      --github: #e6edf3;
      --rss: #f26522;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-left: auto;
    }

    .opml-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: rgba(242, 101, 34, 0.1);
      border: 1px solid rgba(242, 101, 34, 0.35);
      border-radius: 9px;
      color: var(--rss);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .opml-btn:hover {
      background: rgba(242, 101, 34, 0.2);
      border-color: var(--rss);
      transform: translateY(-1px);
    }
    .opml-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 17px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Search ── */
    .search-wrapper {
      position: relative;
      max-width: 520px;
      margin: 0 auto 40px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search::placeholder { color: var(--text-muted); }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .guest-count {
      font-size: 14px;
      color: var(--text-muted);
    }

    .guest-count strong {
      color: var(--text);
    }

    .view-toggle {
      display: flex;
      gap: 6px;
    }

    .view-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }

    .view-btn.active,
    .view-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Grid ── */
    #guests-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    #guests-grid.list-view {
      grid-template-columns: 1fr;
    }

    /* ── Card ── */
    .guest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .guest-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .guest-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .guest-card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .avatar-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      transition: border-color 0.2s;
      background: var(--surface-hover);
    }

    .guest-card:hover .avatar { border-color: var(--accent); }

    .card-info { flex: 1; min-width: 0; }

    .guest-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .guest-title {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .guest-bio {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Tags ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tag {
      background: var(--accent-soft);
      color: #a78bfa;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* ── Social links (icônes seules) ── */
    .card-footer {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .social-link svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .social-link::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #0f1117;
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 1px solid var(--border);
      z-index: 10;
    }
    .social-link:hover::after { opacity: 1; }

    .social-link.linkedin {
      color: var(--linkedin);
      border-color: rgba(10, 102, 194, 0.3);
      background: rgba(10, 102, 194, 0.08);
    }
    .social-link.linkedin:hover {
      background: rgba(10, 102, 194, 0.2);
      border-color: var(--linkedin);
    }

    .social-link.bluesky {
      color: var(--bluesky);
      border-color: rgba(0, 133, 255, 0.3);
      background: rgba(0, 133, 255, 0.08);
    }
    .social-link.bluesky:hover {
      background: rgba(0, 133, 255, 0.2);
      border-color: var(--bluesky);
    }

    .social-link.github {
      color: var(--github);
      border-color: rgba(230, 237, 243, 0.2);
      background: rgba(230, 237, 243, 0.06);
    }
    .social-link.github:hover {
      background: rgba(230, 237, 243, 0.15);
      border-color: var(--github);
    }

    .social-link.rss {
      color: var(--rss);
      border-color: rgba(242, 101, 34, 0.3);
      background: rgba(242, 101, 34, 0.08);
    }
    .social-link.rss:hover {
      background: rgba(242, 101, 34, 0.2);
      border-color: var(--rss);
    }

    /* ── Blog (mis en valeur) ── */
    .blog-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(108, 99, 255, 0.3);
      transition: all 0.2s;
      width: 100%;
    }
    .blog-link:hover {
      background: rgba(108, 99, 255, 0.25);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .blog-link svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── List view overrides ── */
    .list-view .guest-card {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 18px 24px;
    }

    .list-view .card-header {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .list-view .avatar { width: 52px; height: 52px; }

    .list-view .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .list-view .guest-bio {
      margin-bottom: 0;
      flex: 1;
      min-width: 200px;
    }

    .list-view .tags { margin-bottom: 0; }

    .list-view .social-links { flex-shrink: 0; }

    /* ── Role badge ── */
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .role-badge.blog {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .role-badge.speaker {
      background: rgba(52, 211, 153, 0.12);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .role-badge.streamer {
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-tab .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
    }

    .filter-tab[data-role="blog"] .dot { background: #fbbf24; }
    .filter-tab[data-role="speaker"] .dot { background: #34d399; }
    .filter-tab[data-role="streamer"] .dot { background: #ef4444; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      grid-column: 1 / -1;
    }

    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state p { color: var(--text-muted); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 16px; }
      .header-subtitle { display: none; }
      main { padding: 24px 16px; }
      .hero { margin-bottom: 32px; }

      .list-view .guest-card { flex-direction: column; align-items: flex-start; }
      .list-view .card-body { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">🍳</div>
    <span class="logo-text">Cuist<span>Ops</span></span>
  </a>
  <span class="header-subtitle">Le live DevOps francophone du lundi soir !</span>
  <a class="opml-btn" href="cuistops-guests.opml" download>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
    Télécharger l'OPML
  </a>
</header>

<main>
  <div class="hero">
    <h1>La <span>cuisine</span></h1>
    <p>Découvrez la communauté CuistOps ( Guests, viewers, copains ).</p>
  </div>

  <div class="search-wrapper">
    <svg class="search-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      id="search"
      type="search"
      placeholder="Rechercher par nom, titre, tags…"
      aria-label="Rechercher un guest"
      autocomplete="off"
    />
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" data-role="all" onclick="setFilter('all')">Tous</button>
    <button class="filter-tab" data-role="speaker" onclick="setFilter('speaker')"><span class="dot"></span>Speakers</button>
    <button class="filter-tab" data-role="blog" onclick="setFilter('blog')"><span class="dot"></span>Blogs</button>
    <button class="filter-tab" data-role="streamer" onclick="setFilter('streamer')"><span class="dot"></span>Streamers</button>
  </div>

  <div class="stats-bar">
    <p class="guest-count"><strong id="count">0</strong> personne(s) affichée(s)</p>
    <div class="view-toggle">
      <button class="view-btn active" id="grid-btn" title="Vue grille" onclick="setView('grid')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" id="list-btn" title="Vue liste" onclick="setView('list')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="4" width="18" height="3" rx="1"/>
          <rect x="3" y="10.5" width="18" height="3" rx="1"/>
          <rect x="3" y="17" width="18" height="3" rx="1"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="guests-grid"></div>
</main>

<footer style="text-align:center;padding:32px 24px;color:var(--text-muted);font-size:13px;border-top:1px solid var(--border);margin-top:40px;">
  Tu veux apparaître ici ?
  <a href="https://github.com/CuistOps/People" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:none;font-weight:600;">Ouvre une PR sur GitHub</a>
</footer>

<script>
  const ICONS = {
    linkedin: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
    bluesky: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 0 1-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.204-.659-.298-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/></svg>`,
    github: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>`,
    rss: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>`,
    blog: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>`
  };

  let guests = [];
  let currentView = 'grid';
  let activeFilter = 'all';

  async function loadGuests() {
    try {
      const res = await fetch('guests.json');
      if (!res.ok) throw new Error();
      guests = await res.json();
    } catch {
      guests = [];
    }
    render(guests);
  }

  function setView(view) {
    currentView = view;
    const grid = document.getElementById('guests-grid');
    const gridBtn = document.getElementById('grid-btn');
    const listBtn = document.getElementById('list-btn');
    if (view === 'list') {
      grid.classList.add('list-view');
      listBtn.classList.add('active');
      gridBtn.classList.remove('active');
    } else {
      grid.classList.remove('list-view');
      gridBtn.classList.add('active');
      listBtn.classList.remove('active');
    }
  }

  function socialLink(url, type, tooltip) {
    if (!url) return '';
    return `<a class="social-link ${type}" href="${url}" target="_blank" rel="noopener noreferrer" data-tooltip="${tooltip}" onclick="event.stopPropagation()" title="${tooltip}">${ICONS[type]}</a>`;
  }

  function cardHTML(g) {
    const tags = g.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const socials = [
      socialLink(g.linkedin, 'linkedin', 'LinkedIn'),
      socialLink(g.bluesky, 'bluesky', 'Bluesky'),
      socialLink(g.github, 'github', 'GitHub'),
      socialLink(g.rss, 'rss', 'Flux RSS'),
    ].filter(Boolean).join('');

    const blogBtn = g.blog
      ? `<a class="blog-link" href="${g.blog}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${ICONS.blog} Lire le blog</a>`
      : '';

    const ROLE_LABELS = { blog: 'Blog', speaker: 'Speaker', streamer: 'Streamer' };
    const badges = (g.roles ?? [g.role]).map(r => {
      const label = ROLE_LABELS[r] ?? r;
      return `<span class="role-badge ${r}">${label}</span>`;
    }).join('');

    return `
      <article class="guest-card" data-id="${g.id}">
        <div class="card-header">
          <div class="avatar-wrapper">
            <img class="avatar" src="${g.avatar}" alt="${g.name}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(g.name)}&background=6c63ff&color=fff&size=64'" />
          </div>
          <div class="card-info">
            ${badges}
            <div class="guest-name">${g.name}</div>
            <div class="guest-title">${g.title}</div>
          </div>
        </div>
        <div class="card-body">
          <p class="guest-bio">${g.bio}</p>
          <div class="tags">${tags}</div>
          <div class="card-footer">
            <div class="social-links">
              ${socials}
            </div>
            ${blogBtn}
          </div>
        </div>
      </article>`;
  }

  function render(list) {
    const grid = document.getElementById('guests-grid');
    document.getElementById('count').textContent = list.length;

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <div class="emoji">🔍</div>
        <h3>Aucun guest trouvé</h3>
        <p>Essayez un autre terme de recherche.</p>
      </div>`;
      return;
    }

    grid.innerHTML = list.map(cardHTML).join('');
  }

  function setFilter(role) {
    activeFilter = role;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.role === role);
    });
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    let filtered = guests;
    if (activeFilter !== 'all') {
      filtered = filtered.filter(g => (g.roles ?? [g.role]).includes(activeFilter));
    }
    if (q) {
      filtered = filtered.filter(g =>
        g.name.toLowerCase().includes(q) ||
        g.title.toLowerCase().includes(q) ||
        g.bio.toLowerCase().includes(q) ||
        g.tags.some(t => t.toLowerCase().includes(q))
      );
    }
    render(filtered);
  }

  document.getElementById('search').addEventListener('input', applyFilters);

  loadGuests();
</script>

</body>
</html>
